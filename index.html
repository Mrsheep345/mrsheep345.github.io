<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Ejemplo de "grid-template-columns"</title>
    <style>
    .colores {
        display: grid;
        grid-template-columns: repeat(3, 2fr);
        grid-gap: 10px;
        font-size: 30px; 
        height: 500px;
    } 
    #c1 {
        background-color: blue;
        grid-column: 1/3;
        grid-row: 1/2;
    }   
    #c2 {
        background-color:yellow;
        grid-column: 3/4;
        grid-row: 1/3;
    }
    #c3 {
        background-color:red;
        grid-column: 1/2;
        grid-row: 2/3;
    }
    #c4 {
        background-color:orange;
        grid-column: 2/3;
        grid-row: 2/3;
    }

    /* #c5 {
        background-color:green;
        grid-column: 1/4;
        grid-row: 2/3;

} */

    </style>
</head>
<body>
    <section class="colores"> 
        <div class="color" id="c1">1</div>
        <div class="color" id="c2">2</div>
        <div class="color" id="c3">3</div>
        <div class="color" id="c4">4</div>
        <!-- <div class="color" id="c5">5</div> -->
    </section>
</body>
</html>
